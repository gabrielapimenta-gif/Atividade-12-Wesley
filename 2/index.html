<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Supermercado</title>
    <link rel="stylesheet" href="assets/estilo.css">
</head>
<body>

    <header>
        <h1>Supermercado</h1>
    </header>

    <main class="catalogo" id="catalogo">
        <div class="card">
            <div class="foto-produto"><img src="assets/banana.png" alt="Banana"></div>
            <h3>Banana</h3>
            <p>R$ 5,00 / kg</p>
            <button onclick="exibirMensagem('Banana', 'R$ 5,00/kg')">Informações</button>
        </div>

        <div class="card">
            <div class="foto-produto"><img src="assets/batata.png" alt="Batata"></div>
            <h3>Batata</h3>
            <p>R$ 4,50 / kg</p>
            <button onclick="exibirMensagem('Batata' , 'R$ 4,50/kg')">Informações</button>
        </div>

        <div class="card">
            <div class="foto-produto"><img src="assets/maca.png" alt="Maçã"></div>
            <h3>Maçã</h3>
            <p>R$ 7,00 / kg</p>
            <button onclick="exibirMensagem('Maçã', 'R$ 7,00/kg')">Informações</button>
        </div>

        <div class="card">
            <div class="foto-produto"><img src="assets/cebola.png" alt="Cebola"></div>
            <h3>Cebola</h3>
            <p>R$ 3,80 / kg</p>
            <button onclick="exibirMensagem('Cebola', 'R$ 3,80/kg')">Informações</button>
        </div>
    </main>

    <script src="assets/funcionalidade.js"></script>
</body>
</html>
